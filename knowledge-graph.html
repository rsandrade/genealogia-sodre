<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grafo — Família Gramilo Sodré</title>
<style>
/* System font fallback — no external font loading */
:root {
  --parchment: #f4ece1;
  --parchment-deep: #e8dcc8;
  --ink: #1a1008;
  --ink-soft: #3d2e1a;
  --ink-muted: #7a6b55;
  --gold: #9e7c2e;
  --gold-light: #c4a44e;
  --confirmed: #2d5a3d;
  --confirmed-bg: #e8f0eb;
  --hypothetical: #8b2e2e;
  --hypothetical-bg: #f5e8e8;
  --border-line: #c9b896;
  --card-shadow: 0 2px 8px rgba(26,16,8,0.12);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:Georgia,serif;
  background:var(--parchment);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px; z-index:9999;
}

.page-header {
  text-align:center; padding:2.5rem 2rem 1.8rem;
  border-bottom:2px solid var(--gold); position:relative;
  background:linear-gradient(180deg, rgba(232,220,200,0.6) 0%, transparent 100%);
}
.page-header::after {
  content:'✦'; position:absolute; bottom:-14px; left:50%; transform:translateX(-50%);
  background:var(--parchment); padding:0 1rem; color:var(--gold); font-size:1.4rem;
}
.page-header h1 {
  font-family:Georgia,serif;
  font-size:clamp(1.8rem,4vw,3rem); font-weight:700; line-height:1.15;
}
.page-header h1 em { font-style:italic; font-weight:400; color:var(--gold); }
.page-subtitle {
  font-family:Georgia,serif; font-size:1.15rem;
  font-style:italic; color:var(--ink-muted); margin-top:0.4rem;
}

.main-nav{display:flex;gap:0.5rem;justify-content:center;margin:1.5rem 0;flex-wrap:wrap}
.nav-btn{display:inline-block;padding:0.6rem 1.5rem;background:var(--gold);color:var(--parchment);border-radius:3px;font-family:Georgia,serif;font-size:1.1rem;letter-spacing:0.08em;text-decoration:none;transition:all 0.2s;border:1px solid transparent}
.nav-btn:hover{background:var(--ink);color:var(--parchment);border-color:var(--ink);transform:translateY(-1px);box-shadow:0 4px 12px rgba(44,24,16,0.15)}
.nav-btn.active{background:var(--ink);color:var(--parchment);border-color:var(--ink);font-weight:600;cursor:default;pointer-events:none}

/* f3 chart container */
#FamilyChart {
  width:100vw; height:90vh; min-width:1920px; min-height:1080px; position:relative;
  background:var(--parchment);
  overflow:auto;
}
.f3, .f3 > svg, #FamilyChart > svg, .main_svg {
  width:100vw !important;
  height:100% !important;
  min-height:1080px !important;
  background:var(--parchment);
}
#htmlSvg { width:100% !important; height:100% !important; min-height:700px !important; }

/* Info panel */
.info-panel {
  position:fixed; bottom:1.5rem; right:1.5rem;
  background:#fffcf5; border:2px solid var(--gold); border-radius:5px;
  padding:1.44rem 1.8rem; max-width:408px;
  box-shadow:0 6px 24px rgba(26,16,8,0.2);
  z-index:100; display:none; font-size:0.9rem;
}
.info-panel h3 {
  font-family:Georgia,serif; font-size:1.15rem;
  color:var(--ink); margin-bottom:0.5rem; padding-bottom:0.4rem;
  border-bottom:1px solid var(--border-line);
}
.info-rel { font-size:0.82rem; color:var(--ink-soft); padding:0.12rem 0; }
.info-rel .rel-type { font-weight:600; color:var(--gold); }
.info-note { font-size:0.8rem; color:#5a4a3a; font-style:italic; margin-top:0.3rem; }
.info-close { position:absolute; top:6px; right:10px; cursor:pointer; color:var(--ink-muted); font-size:1.3rem; line-height:1; }
.info-close:hover { color:var(--ink); }

/* Controls */
.controls {
  display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap;
  padding:1.2rem 1rem 0.4rem;
}
.ctrl-btn {
  font-family:Georgia,serif; font-size:0.9rem;
  padding:0.35rem 0.9rem; border:1px solid var(--border-line);
  border-radius:3px; background:var(--parchment-deep);
  color:var(--ink-soft); cursor:pointer; transition:all 0.2s;
}
.ctrl-btn:hover { background:var(--gold-light); color:#fff; border-color:var(--gold); }
.ctrl-btn.active { background:var(--gold); color:#fff; border-color:var(--gold); }

/* Legend */
.legend {
  display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;
  padding:0.4rem 1rem 1rem; border-bottom:1px solid var(--border-line);
}
.legend-item { display:flex; align-items:center; gap:0.3rem; font-size:0.8rem; color:var(--ink-muted); }
.legend-dot { width:10.8px; height:10.8px; border-radius:50%; flex-shrink:0; border:1px solid rgba(0,0,0,0.12); }

/* f3 theme override moved to end of stylesheet */

/* Force SVG card colors for parchment theme */
.f3 .card-body-rect { fill: #fffcf5 !important; }
.f3 .card-male .card-body-rect { fill: #dde8f0 !important; }
.f3 .card-female .card-body-rect { fill: #f0dde5 !important; }
.f3 .card-outline { fill: #fffcf5 !important; stroke: #c9b896 !important; stroke-width: 1px !important; }
.f3 .card-main-outline { stroke: #9e7c2e !important; stroke-width: 2px !important; }
.f3 .card text, .f3 .card tspan { fill: #1a1008 !important; font-family: Georgia, serif !important; font-size: 16px !important; }
.f3 .card .card-name { font-size: 18px !important; font-weight: 700 !important; }
.f3 .card .card-sub { font-size: 14px !important; font-weight: 400 !important; }
.f3 .card .card-date { font-size: 13px !important; font-style: italic !important; opacity: 0.85 !important; }
.f3 .card_add .card-body-rect { fill: #e8dcc8 !important; }
.f3 .person-icon { fill: #7a6b55 !important; }
.f3 .card_family_link { stroke: #9e7c2e !important; }
.f3 .line { stroke: #c9b896 !important; }
.f3 .card-edit-info { display: none !important; }
.f3 .text-overflow-mask { fill: #fffcf5 !important; display: none !important; }
.f3 .card-male .text-overflow-mask { fill: #dde8f0 !important; display: none !important; }
.f3 .card-female .text-overflow-mask { fill: #f0dde5 !important; display: none !important; }

.page-footer {
  text-align:center; padding:2rem 1rem; border-top:1px solid var(--border-line); margin-top:1rem;
}
.page-footer p { font-family:Georgia,serif; font-style:italic; color:var(--ink-muted); font-size:0.9rem; line-height:1.6; }
.page-footer a { color:var(--gold); text-decoration:none; }
.f3 {
  --female-color: rgb(196, 138, 146);
  --male-color: rgb(120, 159, 172);
  --genderless-color: lightgray;
  --background-color: rgb(33, 33, 33);
  --text-color: #fff;

  font-family: 'Roboto', sans-serif;
}

.f3 * {
  box-sizing: border-box;
}

.f3 .cursor-pointer {
  cursor: pointer;
}
.f3 svg.main_svg {
  width: 100%;
  height: 100%;
}
.f3 svg.main_svg text {
  fill: currentColor;
}
.f3 rect.card-female, .f3 .card-female .card-body-rect, .f3 .card-female .text-overflow-mask {
  fill: var(--female-color);
}
.f3 rect.card-male, .f3 .card-male .card-body-rect, .f3 .card-male .text-overflow-mask {
  fill: var(--male-color);
}
.f3 .card-genderless .card-body-rect, .f3 .card-genderless .text-overflow-mask {
  fill: var(--genderless-color);
}
.f3 .card_add .card-body-rect {
  fill: #3b5560;
  stroke-width: 4px;
  stroke: #fff;
  cursor: pointer;
}
.f3 g.card_add text {
  fill: #fff;
}
.f3 .card-main-outline {
  stroke: currentColor;
  stroke-width: 3px;
}
.f3 .card_family_tree rect {
  transition: 0.3s;
}
.f3 .card_family_tree:hover rect {
  transform: scale(1.1);
}
.f3 .card_add_relative {
  cursor: pointer;
  color: #fff;
  transition: 0.3s;
}
.f3 .card_add_relative circle {
  fill: rgba(0, 0, 0, 0);
}
.f3 .card_add_relative:hover {
  color: black;
}
.f3 .card_edit.pencil_icon {
  color: #fff;
  transition: 0.3s;
}
.f3 .card_edit.pencil_icon:hover {
  color: black;
}
.f3 .card_break_link, .f3 .link_upper, .f3 .link_lower, .f3 .link_particles {
  transform-origin: 50% 50%;
  transition: 1s;
}
.f3 .card_break_link {
  color: #fff;
}
.f3 .card_break_link.closed .link_upper {
  transform: translate(-140.5px, 655.6px);
}
.f3 .card_break_link.closed .link_upper g {
  transform: rotate(-58deg);
}
.f3 .card_break_link.closed .link_particles {
  transform: scale(0);
}
.f3 .input-field input {
  height: 2.5rem !important;
}
.f3 .input-field > label:not(.label-icon).active {
  -webkit-transform: translateY(-8px) scale(0.8);
  transform: translateY(-8px) scale(0.8);
}
.f3.f3-cont {
  width:100%;
  height:900px;
  max-height:70vh;
  background-color: var(--background-color);
  color: var(--text-color);
}
.f3 {
  position: relative;
  display: flex;
}




/* form-info */
.f3-form input[type="text"],
.f3-form textarea,
.f3-form select {
  width: 100%;
  padding: 8px 12px;
  margin: 8px 0;
  border: 1px solid #ddd;
  border-radius: 4px;
  box-sizing: border-box;
  font-size: 14px;
  background: var(--background-color);
  color: currentColor;
}

.f3-form input[type="text"]:focus,
.f3-form textarea:focus,
.f3-form select:focus {
  box-shadow: 0 0 5px rgba(76, 175, 80, 0.2);
}

.f3-form button {
  padding: 10px 20px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  margin: 10px 0;
  transition: background-color 0.3s ease-in-out, border-color 0.3s ease-in-out, color 0.3s ease-in-out;
}

.f3-form button[type="submit"] {
  background-color: #4CAF50;
  color: white;
}

.f3-cancel-btn {
  background-color: #ccc;
}

.f3-form .f3-delete-btn {
  background-color: transparent;
  border: 1px solid #f44336;
  color: #f44336;
  width: 100%;
  padding: 5px 10px;
}

.f3-delete-btn:hover {
  background-color: #da190b;
  border-color: #da190b;
  color: #fff;
}

.f3-delete-btn:disabled {
  opacity: 0.5;
  background-color: transparent;
  color: #f44336;
  cursor: not-allowed;
}

.f3-form .f3-remove-relative-btn {
  background-color: transparent;
  border: 1px solid currentColor;
  color: currentColor;
  width: 100%;
  padding: 5px 10px;
}

.f3-remove-relative-btn:hover, .f3-remove-relative-btn.active {
  background-color: var(--text-color);
  border-color: var(--text-color);
  color: var(--background-color);
}

.f3-radio-group {
  margin: 15px 0;
}

.f3-radio-group label {
  margin-right: 15px;
  cursor: pointer;
}

.f3-radio-group input[type="radio"] {
  margin-right: 5px;
}

.f3-info-field-label, .f3-form-field label {
  font-weight: bold;
  font-size: 12px;
  display: block;
  opacity: 0.8;
}

.f3-info-field-value {
  font-weight: normal;
  display: block;
  border: none;
  outline: none;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  padding-bottom: 1px;
  margin-bottom: 10px;
  min-height: 18px;
}

.f3-form-buttons {
  text-align: right;
}

.f3-form-title {
  text-align: center;
}

.f3-form.non-editable .f3-form-buttons,
.f3-form.non-editable .f3-delete-btn,
.f3-form.non-editable .f3-remove-relative-btn,
.f3-form.non-editable .f3-link-existing-relative {
  display: none;
}

.f3-close-btn {
  cursor: pointer;
  position: absolute;
  left: 10px;
  top: 8px;
  font-size: 30px;
  color: var(--text-color);
}

.f3-edit-btn {
  position: relative;
  top: -1px;
  width: 24px;
  height: 24px;
  cursor: pointer;
  display: inline-block;
}

.f3-add-relative-btn {
  cursor: pointer;
  width: 27px;
  height: 27px;
  margin-right: 5px;
  display: inline-block;
}

/* card-html */

.f3 div.card {
  cursor: pointer;
  color: var(--text-color);
  position: relative;
  line-height: 1.2;
}

.f3 div.card-image-circle {
  border-radius: 50%;
  padding: 5px;
  width: 90px;
  height: 90px;
}

.f3 div.card-image-circle div.card-label {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translate(-50%, 50%);
  max-width: 150%;
  min-height: 22px;
  text-align: center;
  background-color: rgba(0, 0, 0, 0.5);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-radius: 3px;
  padding: 0 5px;
}

.f3 div.card-image-circle img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.f3 div.card-image-circle svg {
  width: 100%;
  height: 100%;
  padding: 5px;
  border-radius: 50%;
  object-fit: cover;
}

.f3 div.card-image-circle img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.f3 div.card-rect {
  padding: 5px;
  border-radius: 3px;
  width: 120px;
  min-height: 70px;
  overflow: hidden;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
}


.f3 div.card-image-rect {
  width: 200px;
  min-height: 70px;
  display: flex;
  align-items: center;
  border-radius: 5px;
}

.f3 div.card-image-rect .person-icon {
  height: 70px;
  width: 70px;
  object-fit: cover;
  flex: 0 0 auto;
  padding: 5px;
  margin-right: 10px;
}

.f3 div.card-image-rect img {
  height: 70px;
  width: 70px;
  object-fit: cover;
  flex: 0 0 auto;
  padding: 5px;
  margin-right: 10px;
  border-radius: 8px;
}

.f3 div.card-image-rect svg {
  object-fit: cover;
  width: 100%;
  height: 100%;
  padding: 5px;
  border-radius: 7px;
}

.f3 div.card-image-rect div.card-label {
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.f3 div.mini-tree {
  text-align: right;
  position: absolute;
  top: -15px;
  right: -2px;
  z-index: -1;
}
.f3 div.mini-tree svg {
  width: 55px;
}

.f3 .f3-card-duplicate-tag {
  position: absolute;
  top: 2px;
  right: 2px;
  color: rgb(255, 251, 220);
  background-color: rgba(255, 251, 220, 0);
  border-radius: 50%;
  padding: 2px;
  transition: color 0.2s ease-in-out, background-color 0.2s ease-in-out;
}

.f3 .f3-card-duplicate-hover div.card-inner {
  transform: translate(0, -2px);
  outline: 4px solid rgb(255, 251, 220);
}

.f3 .f3-card-duplicate-hover .f3-card-duplicate-tag {
  background-color: rgba(255, 251, 220, .8);
  color: #000;
}

.f3 .f3-remove-relative-active .card {
  background-color: var(--background-color);
}

.f3 .f3-remove-relative-active .card-inner {
  transition: border 0.2s ease-in-out, opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
  opacity: .75;
}

.f3 .f3-remove-relative-active .card:hover .card-inner {
  opacity: .25;
}

.f3 .f3-remove-relative-active .card-male.card-depth--1:hover .card-inner {
  transform: translate(-8px, -8px);
}

.f3 .f3-remove-relative-active .card.card-female.card-depth--1:hover .card-inner {
  transform: translate(8px, -8px);
}

.f3 .f3-remove-relative-active .card.card-female.card-depth-0:hover .card-inner {
  transform: translate(8px, 0);
}

.f3 .f3-remove-relative-active .card.card-male.card-depth-0:hover .card-inner {
  transform: translate(-8px, 0);
}

.f3 .f3-remove-relative-active .card.card-depth-1:hover .card-inner {
  transform: translate(0, 8px);
}

.f3 .f3-remove-relative-active .card.card-main .card-inner {
  transform: translate(0, 0)!important;
  opacity: 1!important;
}



.f3 div.card > div {
  transition: transform 0.2s ease-in-out;
  box-shadow: 0 0 0 0 rgba(0, 0, 0, 0.8);
}

.f3 .card-inner {
  outline: 0px solid rgba(255, 255, 255, 1);
  transition: outline 0.5s ease-in-out;
}

.f3 div.card-female .card-inner, .f3 div.card-female .person-icon svg {
  background-color: var(--female-color);
}
.f3 div.card-male .card-inner, .f3 div.card-male .person-icon svg {
  background-color: var(--male-color);
}
.f3 div.card-genderless .card-inner, .f3 div.card-genderless .person-icon svg {
  background-color: var(--genderless-color);
}

.f3 div.card-new-rel .card-inner, .f3 div.card-new-rel .person-icon svg {
  background-color: var(--background-color);
}

.f3 div.card-to-add .card-inner {
  background-color: var(--background-color);
  border: 1px solid;
}

.f3 div.card-to-add .card-inner .card-label {
  margin: 0 auto;
}

.f3 div.card-to-add .person-icon {
  display: none;
}

.f3 div.card-new-rel .card-inner {
  border-width: 1px;
  border-style: dashed;
  outline: 0px !important;
}
.f3 div.card-new-rel.card-female .card-inner, .f3 div.card-to-add.card-female .card-inner {
  border-color: var(--female-color);
  color: var(--female-color);
}
.f3 div.card-new-rel.card-male .card-inner, .f3 div.card-to-add.card-male .card-inner {
  color: var(--male-color);
  border-color: var(--male-color);
}

.f3 div.card-unknown .card-inner {
  background-color: var(--background-color);
  border: 1px solid;
}

.f3 div.card-unknown .card-inner .card-label {
  margin: 0 auto;
}

.f3 div.card-unknown .person-icon {
  display: none;
}

.f3 div.card-new-rel .card-inner {
  border-width: 1px;
  border-style: dashed;
  outline: 0px !important;
}
.f3 div.card-new-rel.card-female .card-inner, .f3 div.card-unknown.card-female .card-inner {
  border-color: var(--female-color);
  color: var(--female-color);
}
.f3 div.card-new-rel.card-male .card-inner, .f3 div.card-unknown.card-male .card-inner {
  color: var(--male-color);
  border-color: var(--male-color);
}

.f3 div.card:hover > div {
  transform: translate(0, -2px);
}
.f3 div.card-main .card-inner, .f3 div.card:hover .card-inner {
  box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.8);
}

.f3 div.card-main .card-inner {
  outline: 4px solid rgba(220, 220, 220, 1);
}

.f3 div.card-inner.f3-path-to-main {
  outline: 4px solid rgba(255, 255, 255, 1);
}

.f3 .link {
  transition: stroke-width 0.2s ease-in-out;
}

.f3 .link.f3-path-to-main {
  stroke-width: 4px;
}





.f3-form-cont {
  position: relative;
  z-index: 6;
  right: 0;
  top: 0;
  width: 0;
  height: 100%;
  background-color: var(--background-color);
  overflow: auto;
  flex: 0 0 auto;
  box-shadow: 0 0 10px 0 rgba(0, 0, 0, 0.5);
}

.f3-form-cont.opened {
  width: 350px;
}

.f3-form {
  padding: 20px;
}

.f3-form hr {
  border-style: solid; 
  border-width: thin 0 0 0;
  opacity: 0.15;
}

.f3-nav-cont {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  display: flex;
}

.f3-history-controls {
  padding: 8px 5px 7px 9px;
  display: inline-block;
  position: relative;
  z-index: 2;
}

.f3-back-button, .f3-forward-button {
  width: 30px;
  height: 30px;
  transition: opacity 0.3s ease;
  cursor: pointer;
  display: inline-block;
  background-color: transparent;
  border: none;
  margin-right: 10px;
  color: currentColor;
}

.f3-history-controls svg {
  height: 100%;
}

.f3-back-button.disabled, .f3-forward-button.disabled {
  opacity: 0.5;
}

.f3-modal {
  display: none;
  position: absolute;
  z-index: 10;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgb(0,0,0);

// Create chart
let f3Chart = null;
let f3Zoom = null;

function initChart(rootId) {
  const container = document.getElementById('FamilyChart');
  container.innerHTML = '';
  container.className = 'f3';

  f3Chart = f3.createChart('#FamilyChart', F3_DATA);
  f3Chart
    .setTransitionTime(500)
    .setCardXSpacing(420)
    .setCardYSpacing(220);

  const f3Card = f3Chart.setCardSvg();
  f3Card.setCardDim({width: 280, height: 100});
  // Custom display:
  //   Set a callback that returns the array of fields to display in order
  //   (one card → multiple lines). The renderer concatenates the lines
  //   using ", " in a real <text> + <tspan> structure.
  f3Card.setCardDisplay([
    (n) => ((n.data['first name'] || '').trim()) || '',
    (n) => ((n.data['last name'] || '').trim()) || '',
    (n) => ((n.data['birthday'] || '').trim()) || ''
  ]);
  f3Card.setLinkBreak(true);

  // Click handler
  f3Card.setOnCardClick((d) => {
    showInfo(d.data.id);
  });

  // Set main person to virtual_root to show all fragments horizontally aligned
  f3Chart.setAncestryDepth(1);
  f3Chart.setProgenyDepth(8);
  
  // Initial usable focus: core family branch. The virtual root remains in data,
  // but centering on it creates a 132k px-wide graph that appears blank.
  f3Chart.updateMainId(rootId || 'gp1');

  // Apply parchment theme colors to SVG elements after each update.
  f3Chart.setOnUpdate(function () { try { applyParchmentTheme(); } catch (e) { console.warn('[KG] applyParchmentTheme erro:', e); } });

  f3Chart.updateTree({initial: true});
  
  // Enable pan/zoom and center tree — use requestAnimationFrame for correct timing
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      try { enableF3PanZoom(f3Chart); } catch (e) { console.warn('[KG] enableF3PanZoom erro:', e); }
      try { centerF3Tree(f3Chart, {preferredScale: 0.65, minReadableScale: 0.6, fitWidth: false, centerMode: 'main', focusText: 'Marcelo,Gramilo Sodré', offsetX: -350, offsetY: -230}); } catch (e) { console.warn('[KG] centerF3Tree erro:', e); }
      try { applyParchmentTheme(); } catch (e) { console.warn('[KG] applyParchmentTheme erro:', e); }
    });
  });
  setTimeout(() => { try { applyParchmentTheme(); } catch (e) { console.warn('[KG]', e); } }, 600);
}

function enableF3PanZoom(f3Chart) {
  const svgSel = d3.select('#FamilyChart svg.main_svg');
  const svg = svgSel.node();
  if (!svg) return null;
  
  const viewSel = svgSel.select('g.view');
  if (viewSel.empty()) return null;
  
  // Remove any CSS transform that competes with SVG transform
  viewSel.style('transform', null);
  
  let zoom = svg.__zoomObj;
  if (!zoom) {
    zoom = d3.zoom()
      .scaleExtent([0.3, 2.5])
      .on('zoom', function(event) {
        viewSel.style('transform', null).attr('transform', event.transform);
      });
    svg.__zoomObj = zoom;
    svgSel.call(zoom);
  } else {
    zoom.scaleExtent([0.3, 2.5]);
    svgSel.call(zoom);
  }
  
  svgSel.on('dblclick.zoom', null);
  svgSel.style('touch-action', 'none');
  return zoom;
}

function centerF3Tree(f3Chart, options = {}) {
  const {
    padding = 40,
    preferredScale = 1,
    minReadableScale = 0.8,
    maxInitialScale = 1.15,
    fitWidth = false,
    centerMode = 'main',
    duration = 0
  } = options;
  
  const svgSel = d3.select('#FamilyChart svg.main_svg');
  const svg = svgSel.node();
  if (!svg) return;
  
  const zoom = enableF3PanZoom(f3Chart);
  if (!zoom) return;
  
  const cardsView = svg.querySelector('.cards_view');
  if (!cardsView) return;
  
  let bbox;
  try {
    bbox = cardsView.getBBox();
  } catch(e) { return; }
  
  if (!bbox || !isFinite(bbox.width) || bbox.width === 0) return;
  
  const svgRect = svg.getBoundingClientRect();
  const svgW = svgRect.width || 1400;
  const svgH = svgRect.height || 720;
  
  const fitScaleW = (svgW - padding * 2) / bbox.width;
  const fitScaleH = (svgH - padding * 2) / bbox.height;
  
  let scale;
  if (fitWidth) {
    scale = Math.min(fitScaleW, fitScaleH, maxInitialScale);
  } else {
    scale = preferredScale;
    scale = Math.min(scale, fitScaleH, maxInitialScale);
    scale = Math.max(scale, minReadableScale);
  }
  
  let targetCx, targetCy;
  if (options.focusText) {
    const focusCards = Array.from(svg.querySelectorAll('.card_cont'));
    const focusCard = focusCards.find(el => (el.textContent || '').trim() === options.focusText) ||
      focusCards.find(el => (el.textContent || '').includes(options.focusText));
    if (focusCard && focusCard.transform && focusCard.transform.baseVal.length) {
      const matrix = focusCard.transform.baseVal.consolidate().matrix;
      targetCx = matrix.e;
      targetCy = matrix.f;
    }
  }
  if (targetCx == null && centerMode === 'main') {
    const mainCard = svg.querySelector('.card-main') || svg.querySelector('.card-depth-0');
    const mainCardCont = mainCard ? mainCard.closest('.card_cont') : null;
    if (mainCardCont && mainCardCont.transform && mainCardCont.transform.baseVal.length) {
      const matrix = mainCardCont.transform.baseVal.consolidate().matrix;
      targetCx = matrix.e;
      targetCy = matrix.f;
    } else {
      targetCx = bbox.x + bbox.width / 2;
      targetCy = bbox.y + bbox.height / 2;
    }
  } else {
    targetCx = bbox.x + bbox.width / 2;
    targetCy = bbox.y + bbox.height / 2;
  }
  
  const offsetX = options.offsetX || 0;
  const offsetY = options.offsetY || 0;
  const tx = svgW / 2 - targetCx * scale + offsetX;
  const ty = svgH / 2 - targetCy * scale + offsetY;
  
  const transform = d3.zoomIdentity.translate(tx, ty).scale(scale);
  
  if (duration > 0) {
    svgSel.transition().duration(duration).call(zoom.transform, transform);
  } else {
    svgSel.call(zoom.transform, transform);
  }
}

function applyParchmentTheme() {
  document.querySelectorAll('.f3 .card-body-rect').forEach(el => {
    const card = el.closest('.card');
    if (card) {
      if (card.classList.contains('card-female')) el.setAttribute('fill', '#f0dde5');
      else if (card.classList.contains('card-male')) el.setAttribute('fill', '#dde8f0');
      else el.setAttribute('fill', '#fffcf5');
    }
  });
  document.querySelectorAll('.f3 .card-outline').forEach(el => {
    el.setAttribute('fill', '#fffcf5');
    el.setAttribute('stroke', '#c9b896');
    el.setAttribute('stroke-width', '1');
  });
  document.querySelectorAll('.f3 .card-main-outline').forEach(el => {
    el.setAttribute('stroke', '#9e7c2e');
    el.setAttribute('stroke-width', '2');
  });
  document.querySelectorAll('.f3 .card text, .f3 .card tspan').forEach(el => {
    el.setAttribute('fill', '#1a1008');
  });
  document.querySelectorAll('.f3 .text-overflow-mask').forEach(el => {
    const card = el.closest('.card');
    if (card) {
      if (card.classList.contains('card-female')) el.setAttribute('fill', '#f0dde5');
      else if (card.classList.contains('card-male')) el.setAttribute('fill', '#dde8f0');
      else el.setAttribute('fill', '#fffcf5');
    }
  });
  document.querySelectorAll('.f3 .person-icon').forEach(el => {
    el.setAttribute('fill', '#7a6b55');
  });
  document.querySelectorAll('.f3 .line').forEach(el => {
    el.setAttribute('stroke', '#c9b896');
  });
  document.querySelectorAll('.f3 .card_family_link').forEach(el => {
    el.setAttribute('stroke', '#9e7c2e');
  });
}

function showInfo(id) {
  const d = dataMap[id];
  if (!d) return;

  const name = d.data['nome completo'] || d.data['first name'] + ' ' + d.data['last name'];
  const dates = d.data['birthday'] || '';
  document.getElementById('infoName').textContent = name + (dates ? ' (' + dates + ')' : '');

  let html = '';

  // Confiabilidade
  if (d.data['confiabilidade']) {
    const confLabel = {
      'confirmada': '✅ Confirmada',
      'provável': '⚠️ Provável',
      'hipotética': '❓ Hipotética'
    };
    html += '<div class="info-rel"><span class="rel-type">Confiabilidade:</span> ' + (confLabel[d.data['confiabilidade']] || d.data['confiabilidade']) + '</div>';
  }

  // Notes
  if (d.data['notas']) {
    html += '<div class="info-note">' + d.data['notas'] + '</div>';
  }

  // Spouses
  if (d.rels.spouses) {
    d.rels.spouses.forEach(spId => {
      const sp = dataMap[spId];
      if (sp) {
        html += '<div class="info-rel"><span class="rel-type">casou com</span> ' + (sp.data['nome completo'] || sp.data['first name'] + ' ' + sp.data['last name']) + '</div>';
      }
    });
  }

  // Parents
  if (d.rels.parents) {
    d.rels.parents.forEach(pId => {
      const p = dataMap[pId];
      if (p) {
        html += '<div class="info-rel"><span class="rel-type">filho(a) de</span> ' + (p.data['nome completo'] || p.data['first name'] + ' ' + p.data['last name']) + '</div>';
      }
    });
  }

  // Children
  if (d.rels.children) {
    d.rels.children.forEach(cId => {
      const c = dataMap[cId];
      if (c) {
        html += '<div class="info-rel"><span class="rel-type">pai/mãe de</span> ' + (c.data['nome completo'] || c.data['first name'] + ' ' + c.data['last name']) + '</div>';
      }
    });
  }

  document.getElementById('infoBody').innerHTML = html;
  document.getElementById('infoPanel').style.display = 'block';
}

function closeInfo() {
  document.getElementById('infoPanel').style.display = 'none';
}

// Controls: filter by confiabilidade
let activeFilter = null;
function renderControls() {
  const ctrl = document.getElementById('controls');
  ctrl.innerHTML = '';
  const btns = [
    {label:'Todos', filter:null},
    {label:'Confirmados', filter:'confirmada'},
    {label:'Prováveis', filter:'provável'},
    {label:'Hipotéticos', filter:'hipotética'},
  ];
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn' + ((activeFilter === b.filter) ? ' active' : '');
    btn.textContent = b.label;
    btn.onclick = () => { activeFilter = b.filter; filterData(); renderControls(); };
    ctrl.appendChild(btn);
  });
}

function filterData() {
  if (!activeFilter) {
    initChart();
  } else {
    const filtered = F3_DATA.filter(d => d.data['confiabilidade'] === activeFilter);
    // Need to keep parents/spouses that are referenced
    const keepIds = new Set(filtered.map(d => d.id));
    // Also keep parents and spouses of kept people
    filtered.forEach(d => {
      if (d.rels.parents) d.rels.parents.forEach(p => keepIds.add(p));
      if (d.rels.spouses) d.rels.spouses.forEach(s => keepIds.add(s));
    });
    const expanded = F3_DATA.filter(d => keepIds.has(d.id));
    const container = document.getElementById('FamilyChart');
    container.innerHTML = '';
    f3Chart = f3.createChart('#FamilyChart', expanded).setTransitionTime(500).setCardXSpacing(420).setCardYSpacing(220);
    const f3Card = f3Chart.setCardSvg();
    f3Card.setDim && f3Card.setDim({width: 280, height: 100});
    f3Card.setCardDim({width: 280, height: 100});
    f3Card.setCardDisplay([
      (n) => ((n.data['first name'] || '').trim()) || '',
      (n) => ((n.data['last name'] || '').trim()) || '',
      (n) => ((n.data['birthday'] || '').trim()) || ''
    ]);
    f3Card.setLinkBreak(true);
    f3Card.setOnCardClick((d) => {
      showInfo(d.data.id);
    });
    f3Chart.setAncestryDepth(4);
    f3Chart.setProgenyDepth(8);
    f3Chart.updateMainId('virtual_root');
    f3Chart.updateTree({initial: true});
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        enableF3PanZoom(f3Chart);
        centerF3Tree(f3Chart, {preferredScale: 0.65, minReadableScale: 0.6, fitWidth: false, centerMode: 'main', focusText: 'Marcelo,Gramilo Sodré', offsetX: -350, offsetY: -230});
        applyParchmentTheme();
      });
    });
  }
}

  try { renderControls(); } catch (e) { console.warn('[KG] renderControls erro:', e); }
  initChart();

  // Expose functions needed by inline onclick handlers
  window.initChart = initChart;
  window.filterData = filterData;
  window.closeInfo = closeInfo;

} // End startKnowledgeGraph

try {
  startKnowledgeGraph();
} catch (e) {
  console.error('[KG] startKnowledgeGraph falhou:', e);
  const c = document.getElementById('FamilyChart');
  if (c) c.innerHTML = '<div style="padding:24px;color:#7a1f1f;background:#fff3f3;border:1px solid #d99;font-family:monospace;white-space:pre-wrap;">Falha ao iniciar o gráfico.\n\n' + String(e && e.stack ? e.stack : e) + '</div>';
}
</script>
