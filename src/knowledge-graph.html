const container = document.getElementById('network-container');
const options = {
  physics: {
    forceAtlas2Based: {
      gravitationalConstant: -80,
      centralGravity: 0.008,
      springLength: 120,
      springConstant: 0.04,
      damping: 0.4
    },
    maxVelocity: 50,
    solver: 'forceAtlas2Based',
    stabilization: { iterations: 200 }
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    zoomView: true,
    dragView: true,
    multiselect: false
  },
  edges: {
    smooth: { type: 'continuous', roundness: 0.3 }
  },
  nodes: {
    margin: { top: 10, bottom: 10, left: 15, right: 15 },
    shadow: { enabled: true, color: 'rgba(44,24,16,0.08)', size: 3, x: 1, y: 2 }
  }
};

const network = new vis.Network(container, GENEALOGY_DATA, options);

const nodeData = {};
GENEALOGY_DATA.nodes.forEach(n => { nodeData[n.id] = n; });

const edgeData = {};
GENEALOGY_DATA.edges.forEach(e => {
  if (!edgeData[e.from]) edgeData[e.from] = [];
  if (!edgeData[e.to]) edgeData[e.to] = [];
  edgeData[e.from].push(e.label + ' → ' + (nodeData[e.to] ? nodeData[e.to].label.split('\\n')[0] : e.to));
  edgeData[e.to].push((nodeData[e.from] ? nodeData[e.from].label.split('\\n')[0] : e.from) + ' → ' + e.label);
});

network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const node = nodeData[nodeId];
    const panel = document.getElementById('infoPanel');
    document.getElementById('infoName').textContent = node.label.replace(/\\n/g, ' ');
    const rels = edgeData[nodeId] || [];
    const relsHtml = rels.map(r => '<div class="relation"><span class="rel-type">' + r.split(' → ')[1] + '</span> ' + r.split(' → ')[0] + '</div>').join('');
    document.getElementById('infoRelations').innerHTML = relsHtml;
    panel.style.display = 'block';
  } else {
    document.getElementById('infoPanel').style.display = 'none';
  }
});

network.once('stabilizationIterationsDone', function() {
  network.fit({ animation: { duration: 500, easingFunction: 'easeOutQuad' } });
});
</script>
