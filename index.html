<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genealogia Sodré — Família e Knowledge Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --parchment:#f5efe6;
  --parchment-deep:#e8dcc8;
  --ink:#2c1810;
  --ink-light:#5a3e2b;
  --ink-muted:#8b7355;
  --gold:#b8860b;
  --gold-light:#d4a843;
  --line:#c9b896;
  --line-faint:rgba(201,184,150,0.45);
  --shadow:rgba(44,24,16,0.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Source Sans 3',sans-serif;
  background:var(--parchment);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
  z-index:9999;
}
.site-header{
  text-align:center;
  padding:3.4rem 2rem 2.1rem;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(232,220,200,0.62) 0%,rgba(245,239,230,0.92) 100%);
  position:relative;
}
.site-header::after{
  content:'';
  position:absolute;
  bottom:-1px;
  left:50%;
  transform:translateX(-50%);
  width:88px;
  height:4px;
  background:var(--gold);
}
.header-ornament{
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--ink-muted);
  margin-bottom:0.7rem;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.4rem,5vw,4.6rem);
  font-weight:900;
  line-height:1.05;
}
h1 em{font-weight:400;color:var(--gold)}
.subtitle{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.25rem,2.4vw,2rem);
  font-style:italic;
  color:var(--ink-muted);
  margin-top:0.55rem;
}
.mode-switch{
  position:sticky;
  top:0;
  z-index:50;
  display:flex;
  flex-wrap:wrap;
  gap:0.75rem;
  justify-content:center;
  align-items:center;
  padding:1rem 1.25rem;
  background:rgba(232,220,200,0.96);
  border-bottom:1px solid var(--line);
  box-shadow:0 2px 10px rgba(44,24,16,0.05);
}
.mode-button{
  font-family:'Source Sans 3',sans-serif;
  font-size:1rem;
  font-weight:700;
  letter-spacing:0.03em;
  border:1px solid var(--line);
  border-radius:999px;
  padding:0.72rem 1.25rem;
  background:#fffcf7;
  color:var(--ink-light);
  cursor:pointer;
  transition:transform 0.18s ease,box-shadow 0.18s ease,background 0.18s ease,color 0.18s ease,border-color 0.18s ease;
}
.mode-button:hover{transform:translateY(-1px);box-shadow:0 5px 15px var(--shadow)}
.mode-button.active{background:var(--gold);border-color:var(--gold);color:#fff;box-shadow:0 5px 18px rgba(184,134,11,0.22)}
.mode-note{
  flex-basis:100%;
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;
  font-style:italic;
  color:var(--ink-muted);
  line-height:1.35;
}
.viewer-shell{
  max-width:1400px;
  margin:0 auto;
  padding:0 0 2rem;
}
#viewFrame{
  display:block;
  width:100%;
  min-height:calc(100vh - 245px);
  border:0;
  background:var(--parchment);
}
.loading{
  text-align:center;
  padding:1rem;
  font-family:'Cormorant Garamond',serif;
  color:var(--ink-muted);
  font-style:italic;
}
.fallback-links{
  text-align:center;
  padding:1rem;
  color:var(--ink-muted);
}
.fallback-links a{color:var(--gold);font-weight:700}
@media(max-width:720px){
  .site-header{padding:2.3rem 1.1rem 1.55rem}
  .mode-switch{position:static;gap:0.55rem;padding:0.85rem 0.7rem}
  .mode-button{width:100%;max-width:360px;font-size:0.95rem}
  #viewFrame{min-height:calc(100vh - 280px)}
}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-ornament">Genealogia Sodré</div>
  <h1>Família <em>Gramilo Sodré</em></h1>
  <p class="subtitle">Duas leituras complementares: linhagem familiar curada e mapa ampliado de possibilidades</p>
</header>

<nav class="mode-switch" aria-label="Alternar visualização">
  <button class="mode-button active" type="button" data-view="familia">Família · linhagem direta</button>
  <button class="mode-button" type="button" data-view="kg">Família - personagens e hipóteses</button>
  <div class="mode-note" id="modeNote">Versão familiar: dados comprovados ou hipóteses diretamente relacionadas à linhagem de Francisco Gramilo Sodré.</div>
</nav>

<main class="viewer-shell">
  <div class="loading" id="loading">Carregando visualização…</div>
  <iframe id="viewFrame" title="Visualização genealógica" src="src/arvore.html?embedded=1&v=20260612-section-scroll"></iframe>
  <noscript>
    <div class="fallback-links">
      JavaScript está desativado. Acesse diretamente:
      <a href="src/arvore.html">Família</a> ·
      <a href="src/knowledge-graph.html">Família - personagens e hipóteses</a>
    </div>
  </noscript>
</main>

<script>
const views = {
  familia: {
    src: 'src/arvore.html?embedded=1&v=20260612-section-scroll',
    note: 'Versão familiar: dados comprovados ou hipóteses diretamente relacionadas à linhagem de Francisco Gramilo Sodré.'
  },
  kg: {
    src: 'src/knowledge-graph.html?embedded=1&v=20260612-section-scroll',
    note: 'Família - personagens e hipóteses: personagens documentados, ramos paralelos de Amargosa e hipóteses fundamentadas para investigação.'
  }
};
const frame = document.getElementById('viewFrame');
const loading = document.getElementById('loading');
const note = document.getElementById('modeNote');
const buttons = [...document.querySelectorAll('.mode-button')];

function resizeFrame() {
  try {
    const doc = frame.contentDocument || frame.contentWindow.document;
    const h = Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight, window.innerHeight - 245);
    frame.style.height = h + 'px';
  } catch (_) {
    frame.style.height = 'calc(100vh - 245px)';
  }
}

function setView(view, persist=true) {
  const cfg = views[view] || views.familia;
  buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.view === view));
  note.textContent = cfg.note;
  loading.style.display = 'block';
  if (frame.getAttribute('src') !== cfg.src) frame.setAttribute('src', cfg.src);
  if (persist) localStorage.setItem('genealogia-sodre-view', view);
}

buttons.forEach(btn => btn.addEventListener('click', () => setView(btn.dataset.view)));
frame.addEventListener('load', () => {
  loading.style.display = 'none';
  resizeFrame();
  setTimeout(resizeFrame, 250);
  setTimeout(resizeFrame, 900);
});
window.addEventListener('resize', resizeFrame);

const initial = localStorage.getItem('genealogia-sodre-view') || 'familia';
setView(initial, false);
</script>
</body>
</html>
